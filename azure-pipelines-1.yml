trigger:
- main

pool:
  name: Default

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore
  displayName: 'Restore'

- script: dotnet build -c Release
  displayName: 'Build'

- script: dotnet publish ClassLibrary1/ClassLibrary1.csproj -c Release -o $(Build.ArtifactStagingDirectory)
  displayName: 'Publish'