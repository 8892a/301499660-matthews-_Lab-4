trigger:
- main

pool:
  name: Default

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore
  displayName: 'Restore'

- script: dotnet build -c Release
  displayName: 'Build'

- script: dotnet pack "ClassLibrary1/ClassLibrary1.csproj" -c Release -o "$(Build.ArtifactStagingDirectory)"
  displayName: 'Pack'

- task: NuGetAuthenticate@1

- script: dotnet nuget push "$(Build.ArtifactStagingDirectory)\*.nupkg" --source "Artifact-Lab4" --api-key az --skip-duplicate
  displayName: 'Push to Azure Artifacts'